name: UPPCL Daily Tracker

on:
  schedule:
    # Runs at 9:00 AM IST (3:30 AM UTC) everyday
    - cron: '30 03 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  scrape-and-notify:
    runs-on: windows-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Cache dependencies to speed up runs
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps
        
    - name: Run UPPCL Tracker
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        UPPCL_ACCOUNT_1_DISTRICT: ${{ secrets.UPPCL_ACCOUNT_1_DISTRICT }}
        UPPCL_ACCOUNT_1_DISCOM: ${{ secrets.UPPCL_ACCOUNT_1_DISCOM }}
        UPPCL_ACCOUNT_1_NUMBER: ${{ secrets.UPPCL_ACCOUNT_1_NUMBER }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: python main.py
